# Gh Ost Workflow Update Go Version Or Linting

## Action

Follow the update-go-version-or-linting workflow:
1. Update configuration files (e.g., go.mod, Dockerfile, .golangci.yml, workflow YAMLs)
2. Update scripts related to Go setup and testing
3. Modify or touch Go source and test files to address compatibility or linting issues
4. Update or add test expectations if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: go.mod, Dockerfile.packaging, Dockerfile.test

